name: Feature proposal
description: Propose a new feature (lightweight RFC)
labels: ["feature", "rfc"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: textarea
    id: security
    attributes:
      label: Security impact
      description: Any impact on the API contract, report format, or security model?
    validations:
      required: true
